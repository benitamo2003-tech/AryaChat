<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/chat.css">
    <title>AryaChat - صفحه اصلی</title>
</head>

<body>

    <div class="app">
        <div class="list">
            <label class="list-dropdown">
                <i class="fa-solid fa-bars-staggered" style="color: rgb(30, 48, 80);">
                    <input type="checkbox" id="toggle">
                </i>
                <div class="dropdown-content">
                    <button onclick="showProfile()">پروفایل من</button>
                    <button onclick="startPrivateChat({email:'Saved Messages', firstName:'Saved Messages'})">Saved Messages</button>
                    <button onclick="openCreateGroup()">ساخت گروه جدید</button>
                    <button>Setting</button>
                    <button onclick="logout()">خروج</button>
                </div>
            </label>
        </div>

        <div class="sidebar" id="main-sidebar">
            <h3>AryaChat</h3>
            <p><span id="profile-email" style="font-size: 11px; color: #048796;"></span></p>
            
            <div class="search-container" style="padding: 10px; position: relative;">
                <input type="text" id="search-input" placeholder="جستجوی نام، آیدی یا ایمیل..." style="width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
                <div id="search-results" style="position: absolute; width: 95%; z-index: 100; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px;"></div>
            </div>

            <div id="group-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:300; align-items:center; justify-content:center;">
    <div style="background:white; width:90%; max-width:380px; padding:25px; border-radius:20px; box-shadow:0 15px 35px rgba(0,0,0,0.3);">
        <h3 style="margin-top:0; color:#048796; text-align:center;">ساخت گروه جدید</h3>
        
        <div style="text-align:center; margin-bottom:20px;">
            <div onclick="document.getElementById('groupAvatarInput').click()" style="width:80px; height:80px; background:#f0f0f0; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; cursor:pointer; border:2px dashed #048796;">
                <i class="fa-solid fa-camera fa-2xl" style="color:#048796;"></i>
                <img id="group-avatar-preview" src="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
            </div>
            <p style="font-size:11px; color:gray; margin-top:5px;">انتخاب عکس گروه</p>
            <input type="file" id="groupAvatarInput" style="display:none" onchange="previewGroupAvatar(this)">
        </div>

        <input type="text" id="group-name-input" placeholder="نام گروه (اجباری)" style="width:100%; margin-bottom:15px; padding:12px; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;">
        <input type="text" id="group-username-input" placeholder="آیدی گروه (مثل: MyGroup)" style="width:100%; margin-bottom:20px; padding:12px; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;">
        
        <button onclick="confirmCreateGroup()" style="width:100%; background:#048796; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px;">ایجاد گروه</button>
        <button onclick="closeGroupModal()" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer;">انصراف</button>
    </div>
</div>

            <div id="chat-list" style="overflow-y: auto; height: calc(100% - 180px);"></div>
        </div>

        <div id="profile-overlay" onclick="hideProfile()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:99;"></div>

<div id="profile-section" class="sidebar" style="display:none; position:absolute; z-index:100; width:280px; height:100%; background:#fff; overflow-y:auto; border-left:1px solid #ddd; transition: all 0.3s ease;">
    <div style="background:#048796; color:white; padding:15px; display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fa-solid fa-user-circle"></i>
            <span style="font-weight:bold;">پروفایل</span>
        </div>
        <button onclick="hideProfile()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div style="text-align:center; padding:20px; border-bottom:8px solid #f4f4f5;">
        <img id="main-avatar" src="img/default-avatar.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #048796; cursor:pointer;">
        <h4 id="display-name-top" style="margin:10px 0 5px 0;">نام کاربر</h4>
        <p id="display-status-top" style="font-size:12px; color:gray;">آنلاین</p>
    </div>
    
    <div style="display:flex; justify-content:space-around; padding:15px; border-bottom:1px solid #eee;">

                <button onclick="document.getElementById('avatarInput').click()" title="ست پروفایل" style="background:none; border:none; color:#048796; cursor:pointer;"><i class="fa-solid fa-camera fa-xl"></i><br><span style="font-size:10px;">ست عکس</span></button>

                <button onclick="openEditModal()" title="ادیت اینفو" style="background:none; border:none; color:#048796; cursor:pointer;" class="edit-btn"><i class="fa-solid fa-pen fa-xl"></i><br><span style="font-size:10px;">ادیت اینفو</span></button>

                <button onclick="alert('تنظیمات به زودی...')" title="ستینگ" style="background:none; border:none; color:#048796; cursor:pointer;"><i class="fa-solid fa-gear fa-xl"></i><br><span style="font-size:10px;">تنظیمات</span></button>

            </div>
    
            <div style="padding:15px;">

                <div class="info-item" style="margin-bottom:15px;">

                    <i class="fa-solid fa-at" style="color:#048796;"></i>

                    <span id="info-username" style="margin-right:10px; font-weight:bold;">بدون آیدی</span>

                    <div style="font-size:11px; color:gray; margin-right:25px;">آیدی کاربری</div>

                </div>

                <div class="info-item" style="margin-bottom:15px;">

                    <i class="fa-solid fa-envelope" style="color:#048796;"></i>

                    <span id="info-email" style="margin-right:10px;">---</span>

                    <div style="font-size:11px; color:gray; margin-right:25px;">ایمیل</div>

                </div>

                <div class="info-item">

                    <i class="fa-solid fa-circle-info" style="color:#048796;"></i>

                    <p id="info-bio" style="margin:0 10px 0 0; font-size:14px; color:#333;">بیوگرافی شما...</p>

                    <div style="font-size:11px; color:gray; margin-right:25px;">بیو</div>

                </div>

            </div>



    <div style="border-top:8px solid #f4f4f5; padding:15px;">
        <h5 style="margin-top:0;">مدیریت حساب‌ها</h5>
        <div id="accounts-list" style="margin-top: 10px;"></div>
        <button onclick="addAccount()" style="width:100%; text-align:right; background:none; border:none; color:#048796; cursor:pointer; padding:10px 0;"><i class="fa-solid fa-user-plus"></i> افزودن اکانت جدید</button>
    </div>
    <button onclick="logout()" style="width:100%; padding:15px; background:none; border:none; cursor:pointer; border-top:1px solid #eee;">خروج از اکانت</button>
</div>

        <div class="chat-area">
            <div class="chat-header" id="active-chat-header" onclick="openRightPanel()" style="cursor: pointer;">
    <i class="fa-solid fa-circle-user" id="header-avatar-icon" style="font-size: 24px;"></i> 
    <h4 id="chat-title" style="margin-right: 10px; flex: 1;">Saved Messages</h4>
    <span id="status" style="font-size:12px; margin-left: 15px; color: #4caf50;"></span>
</div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <button><i class="fa-regular fa-face-smile-wink" style="color: rgb(30, 48, 80); font-size: 20px;"></i></button>
                
                <input type="file" id="fileInput" style="display:none" onchange="sendFile(this)" accept="image/*,video/*,audio/*">
                <button onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-paperclip" style="color: rgb(30, 48, 80); font-size: 20px;"></i>
                </button>
                
                <input id="msg" placeholder="پیام خود را بنویسید..." autocomplete="off" />
                
                <button onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane" style="color: #048796; font-size: 22px;"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:350px; padding:20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
            <h4 style="margin-top:0;">ویرایش اطلاعات</h4>
            <input type="text" id="edit-fullname" placeholder="نام و نام خانوادگی" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            <input type="text" id="edit-username" placeholder="آیدی (بدون @)" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            <textarea id="edit-bio" placeholder="بیوگرافی (حداکثر ۱۰۰ حرف)" maxlength="100" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd; border-radius:8px; height:60px; resize:none; box-sizing: border-box;"></textarea>
            <label style="font-size:12px; color:gray;">تاریخ تولد:</label>
            <input type="date" id="edit-birth" style="width:100%; margin-bottom:20px; padding:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            
            <button onclick="saveFullProfile()" style="width:100%; background:#048796; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ذخیره تغییرات</button>
            <button onclick="document.getElementById('edit-modal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer;">انصراف</button>
        </div>
    </div>

    <div id="avatar-viewer" class="avatar-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center;">
        <div style="position:absolute; top:20px; right:20px; color:white; font-size:30px; cursor:pointer;" onclick="closeAvatarViewer()">×</div>
        
        <div id="no-screenshot-area" oncontextmenu="return false;" style="user-select:none; -webkit-user-drag:none;">
            <img id="full-res-avatar" src="" style="max-width:90vw; max-height:75vh; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.5);">
        </div>

        <div style="margin-top:20px; color:white; display:flex; gap:40px; align-items:center;">
            <button onclick="prevAvatar()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-chevron-right fa-2xl"></i></button>
            <span id="avatar-counter" style="font-family: monospace; font-size: 18px;">۱ از ۱</span>
            <button onclick="nextAvatar()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-chevron-left fa-2xl"></i></button>
        </div>
        <div id="owner-tools" style="display:none; margin-top:20px; gap:15px;">
            <button onclick="deleteAvatar()" style="background:#ff4757; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-trash"></i> حذف</button>
            <button onclick="downloadCurrentAvatar()" style="background:#2ed573; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-download"></i> ذخیره</button>
        </div>
    </div>

    <input type="file" id="avatarInput" style="display:none" onchange="uploadAvatar(this)" accept="image/*">


    <div id="right-panel" class="right-panel">
    <div class="panel-header">
        <button onclick="closeRightPanel()"><i class="fa-solid fa-xmark"></i></button>
        <span>Group Info</span>
        <button id="edit-profile-btn" style="display:none;"><i class="fa-solid fa-pen"></i></button>
    </div>
    
    <div id="right-panel" class="right-panel">
    <div class="panel-header">
        <i class="fa-solid fa-xmark" onclick="closeRightPanel()" style="cursor:pointer"></i>
        <span>اطلاعات</span>
    </div>
    <div class="panel-body">
        <img id="panel-img" class="panel-avatar" src="" style="width:100px; height:100px; border-radius:50%;">
        <h2 id="panel-name"></h2>
        <p id="panel-username" style="color: gray;"></p>
        <div class="info-box">
            <small style="color: #048796;">بیوگرافی</small>
            <div id="panel-bio"></div>
        </div>
    </div>
</div>
            <label class="switch">
                <input type="checkbox" checked onchange="toggleMute(this)">
                <span class="slider round"></span>
            </label>
        </div>
    </div>
</div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const token = localStorage.getItem("token");
        const email = localStorage.getItem("email");
        
        if (!token) {
            window.location.href = "/login.html";
        }
        
        window.onload = () => {
            if(document.getElementById("profile-email")) {
                document.getElementById("profile-email").innerText = email || "کاربر مهمان";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = "/login.html";
        }
    </script>
    <script src="js/chat.js"></script>

</body>
</html>
