<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/chat.css">
  <title>AryaChat - صفحه اصلی</title>
</head>

<body>

  <div class="app">
    <!--list menu-->
    <div class="list">
      <label class="list-dropdown">
        <i class="fa-solid fa-bars-staggered" style="color: rgb(30, 48, 80);">
          <input type="checkbox" id="toggle">
        </i>
        <div class="dropdown-content">
          <button>Add Account</button>
          <button>Saved Messages</button>
          <button>Contacts</button>
          <button>Setting</button>
          <button>More</button>

        </div>
      </label>



    </div>
    <!-- Sidebar -->
    <div class="sidebar">
      <h3>AryaChat</h3>
      <p><span id="profile-email"></span></p>
      <div class="search-box">
        <input id="searchInput" placeholder="جستجو با ایمیل..." oninput="searchUser()" />
        <div id="searchResults"></div>
      </div>



    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <i class="fa-chisel fa-regular fa-bookmark"></i>
        <h4 id="chat-title">Saved Messages</h4>
        <span id="status" style="font-size:12px;color:gray"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button><i class="fa-regular fa-face-smile-wink" style="color: rgb(30, 48, 80); "></i></button>
        <button><i class="fa-solid fa-paperclip" style="color: rgb(30, 48, 80); "></i></button>
        <input id="msg" placeholder="پیام خود را بنویسید..." />
        <div id="typing" style="font-size:12px;color:gray"></div>
        <button onclick="sendMessage()"><i class="fa-etch fa-solid fa-paper-plane"
            style="color: rgb(30, 48, 80);"></i></button>
      </div>
    </div>

  </div>



  <script>
    // بررسی ورود
    const token = localStorage.getItem("token");
    const email = localStorage.getItem("email");
    if (!token || !email) {
      window.location.href = "/login.html";
    }
    document.getElementById("profile-email").innerText = email;
  </script>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/frontend/js/chat.js"></script>

</body>

</html>
